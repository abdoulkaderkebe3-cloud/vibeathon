; EcoWatt - firmware prise ESP32 (ADR-001 voie sur mesure, ADR-002 WebSocket)
; Build/flash avec PlatformIO :  pio run -t upload   puis   pio device monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    links2004/WebSockets @ ^2.6.1
    bblanchon/ArduinoJson @ ^7.2.0
