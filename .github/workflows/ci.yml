name: CI

# Intégration continue EcoWatt : lint + tests à chaque push et pull request.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: python -m pytest -q

  frontend:
    name: Frontend (lint + typecheck + tests + builds)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Tests (vitest)
        run: npm test

      - name: Build complet (démo + réel, pour la présentation)
        run: npm run build

      # La vitrine est ce que le jury voit en ligne : si son build casse, on l'apprend ici et non au
      # moment de déployer.
      - name: Build vitrine (déploiement public)
        run: npm run build:vitrine
